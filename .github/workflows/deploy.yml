name: Build & Deploy (Cloud Build)

# Thin trigger — authenticates to GCP via Workload Identity Federation and
# submits cloudbuild.yaml to Cloud Build. All build/sign/deploy logic lives
# in cloudbuild.yaml.
#
# Branch → environment mapping (per project decision):
#   push main      → dev  (yggdrasil-web-dev service)
#   any other push → skip the deploy (CI only runs)
#   workflow_dispatch → choose dev / prod on the manual trigger
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        type: choice
        default: dev
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  REGION: 'us-central1'
  PROJECT_ID: 'yggdrasil-yggi'

jobs:
  trigger:
    name: Trigger Cloud Build
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment + SHA
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.env }}"
          else
            ENV="dev"
          fi
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GITHUB_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit build to Cloud Build
        run: |
          gcloud builds submit . \
            --config=cloudbuild.yaml \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --substitutions=_ENV=${{ steps.env.outputs.env }},_SHORT_SHA=${{ steps.env.outputs.sha }} \
            --timeout=1800s

      - name: Report
        run: |
          echo "::notice::Deployed yggdrasil-web (${{ steps.env.outputs.sha }}) to ${{ steps.env.outputs.env }}"
          echo "Image: us-docker.pkg.dev/${{ env.PROJECT_ID }}/docker/yggdrasil-web:${{ steps.env.outputs.env }}-${{ steps.env.outputs.sha }}"
